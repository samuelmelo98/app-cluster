apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: prod

spec:
  replicas: 1

  selector:
    matchLabels:
      app: minio

  template:
    metadata:
      labels:
        app: minio

    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          imagePullPolicy: IfNotPresent

          args:
            - server
            - /data
            - --console-address
            - ":9001"

          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER

            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD

            - name: MINIO_SERVER_URL
              value: "https://minio.cluster.stringtecnologiadf.org"

            - name: MINIO_BROWSER_REDIRECT_URL
              value: "https://minio-console.cluster.stringtecnologiadf.org"

          ports:
            - name: api
              containerPort: 9000

            - name: console
              containerPort: 9001

          volumeMounts:
            - name: data
              mountPath: /data

          resources:
            requests:
              cpu: 500m
              memory: 800Mi

            limits:
              cpu: "1"
              memory: 1Gi

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
