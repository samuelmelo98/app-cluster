resources:
- ../../base
- ingress.yml

namePrefix: site-html-

images:
- name: IMAGE_PLACEHOLDER
  newName: nginx

patches:
  - target:
      kind: Deployment
      name: app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/ports/0/containerPort
        value: 8080

  - target:
      kind: Service
      name: app
    patch: |
      - op: replace
        path: /spec/ports/0/targetPort
        value: 8080

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
