apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base

namePrefix: string-api-

images:
  - name: IMAGE_PLACEHOLDER
    newName: ghcr.io/samuelmelo98/string-api
    newTag: 4.0.1

replicas:
  - name: app
    count: 1

labels:
  - includeSelectors: true
    pairs:
      app: string-api

patches:

  # 🔥 INGRESS
  - target:
      kind: Ingress
      name: app
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: string-api.cluster.stringtecnologiadf.org

  # 🔥 DEPLOYMENT (Ports & Environment Variables)
  - target:
      kind: Deployment
      name: app
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/ports/0/containerPort
        value: 8080

      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: SPRING_PROFILES_ACTIVE
            value: prod

          - name: URL
            valueFrom:
              secretKeyRef:
                name: string-api-secret
                key: infosimples-url

          - name: KEY
            valueFrom:
              secretKeyRef:
                name: string-api-secret
                key: infosimples-key

          - name: USUARIO
            valueFrom:
              secretKeyRef:
                name: string-api-secret
                key: db-user

          - name: SENHA
            valueFrom:
              secretKeyRef:
                name: string-api-secret
                key: db-pass

          - name: NAME_SERVER
            valueFrom:
              secretKeyRef:
                name: string-api-secret
                key: name-server

          - name: PORT
            valueFrom:
              secretKeyRef:
                name: string-api-secret
                key: name-port
    - op: add
      path: /spec/template/spec/volumes
      value:
        - name: documentos
          persistentVolumeClaim:
            claimName: documentos-pvc

    - op: add
      path: /spec/template/spec/containers/0/volumeMounts
      value:
        - name: documentos
          mountPath: /data/documentos

  # 🔥 SERVICE (targetPort)
  - target:
      kind: Service
      name: app
    patch: |-
      - op: replace
        path: /spec/ports/0/targetPort
        value: 8080

  # 🔥 SERVICE (selector - ESSENCIAL)
  - target:
      kind: Service
      name: app
    patch: |-
      - op: replace
        path: /spec/selector/app
        value: string-api
